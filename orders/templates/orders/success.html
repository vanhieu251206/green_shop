{% extends 'base.html' %}

{% block title %}Đặt hàng thành công{% endblock %}

{% block content %}
<style>
    .success-section {
        padding: 80px 0;
        background: #f8faf8;
    }

    .success-card {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border-radius: 18px;
        padding: 45px 30px;
        text-align: center;
        border: 1px solid #edf2ee;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .success-icon {
        width: 90px;
        height: 90px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4caf50, #2e7d32);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 700;
    }

    .success-card h2 {
        font-size: 32px;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 14px;
    }

    .success-card p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.7;
        margin-bottom: 12px;
    }

    .success-actions {
        margin-top: 25px;
    }

    .success-btn,
    .success-btn-outline {
        display: inline-block;
        padding: 13px 22px;
        border-radius: 12px;
        font-weight: 700;
        text-decoration: none !important;
        transition: 0.2s ease;
        margin: 6px;
    }

    .success-btn {
        background: linear-gradient(135deg, #46a358, #2e7d32);
        color: #fff !important;
    }

    .success-btn-outline {
        background: #fff;
        color: #2e7d32 !important;
        border: 1px solid #cfe3d2;
    }

    .success-btn:hover,
    .success-btn-outline:hover {
        transform: translateY(-1px);
    }
</style>

<div class="success-section">
    <div class="container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2>Đặt hàng thành công</h2>
            <p>Cảm ơn bạn đã mua sắm tại Green Shop.</p>
            <p>Đơn hàng của bạn đã được ghi nhận. Chúng tôi sẽ sớm liên hệ để xác nhận và giao hàng.</p>

            <div class="success-actions">
                <a href="{% url 'home' %}" class="success-btn">Về trang chủ</a>
                <a href="{% url 'product_list' %}" class="success-btn-outline">Tiếp tục mua sắm</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
