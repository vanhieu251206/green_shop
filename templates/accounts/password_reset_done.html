{% extends 'base.html' %}
{% load static %}

{% block title %}Đã gửi email{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Đã gửi email</h1>

        <div class="auth-divider">
            <span>Kiểm tra hộp thư của bạn</span>
        </div>

        <p class="auth-switch-text" style="margin-top: 0;">
            Nếu email tồn tại trong hệ thống, bạn sẽ nhận được liên kết đặt lại mật khẩu.
        </p>

        <p class="auth-switch-text">
            <a href="{% url 'login' %}">Quay lại đăng nhập</a>
        </p>
    </div>
</section>
{% endblock %}
