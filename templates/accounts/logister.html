{% extends 'base.html' %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 60px; margin-bottom: 60px;">
    <h2 style="margin-bottom: 24px;">Đăng ký</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Tạo tài khoản</button>
        <a href="{% url 'login' %}" class="btn btn-default">Đăng nhập</a>
    </form>
</div>
{% endblock %}
