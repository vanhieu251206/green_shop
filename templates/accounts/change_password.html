{% extends 'base.html' %}

{% block title %}Chỉnh sửa thông tin{% endblock %}

{% block content %}
<div class="container" style="max-width: 760px; margin-top: 50px; margin-bottom: 60px;">
    <div style="background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.06);">
        <h2 style="margin-bottom: 24px;">Chỉnh sửa thông tin</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div style="margin-top: 20px; display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                <a href="{% url 'profile' %}" class="btn btn-default">Quay lại</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
