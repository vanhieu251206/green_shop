{% extends 'base.html' %}
{% load static %}

{% block title %}Đặt lại mật khẩu thành công{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Thành công</h1>

        <div class="auth-divider">
            <span>Mật khẩu đã được cập nhật</span>
        </div>

        <p class="auth-switch-text" style="margin-top: 0;">
            Bạn có thể đăng nhập bằng mật khẩu mới ngay bây giờ.
        </p>

        <p class="auth-switch-text">
            <a href="{% url 'login' %}">Đăng nhập</a>
        </p>
    </div>
</section>
{% endblock %}
